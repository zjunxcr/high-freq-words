<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高频词汇学习 - Day {{day_num}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #e8ecf1;
            background-image: 
                radial-gradient(at 20% 30%, rgba(102,126,234,0.06) 0%, transparent 50%),
                radial-gradient(at 80% 70%, rgba(72,187,120,0.06) 0%, transparent 50%);
            min-height: 100vh;
            color: #2d3748;
            padding-bottom: 60px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #667eea 0%, #48bb78 100%);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
            animation: shimmer 10s infinite linear;
        }
        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .header h1 {
            font-size: 26px;
            color: #fff;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
            position: relative;
        }
        .header .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            position: relative;
        }
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 15px;
            flex-wrap: wrap;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
        }
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            transition: all 0.3s;
        }
        .progress-dot.done { background: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.6); }
        .progress-dot.current { background: #fdd835; box-shadow: 0 0 8px #fdd835; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* Word Cards Section */
        .section-title {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin: 30px 20px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .section-title .emoji { font-size: 24px; }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 18px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .word-card {
            background: #fff;
            border-radius: 16px;
            padding: 22px;
            border: 1px solid #dde4ed;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            position: relative;
            overflow: hidden;
        }
        .word-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(102,126,234,0.15);
            border-color: #a3bffa;
        }
        .word-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #48bb78, #ed8936);
        }
        .card-number {
            position: absolute;
            top: 12px;
            right: 15px;
            font-size: 11px;
            color: #a0aec0;
            font-weight: 600;
        }

        .word-main {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .word-text {
            font-size: 28px;
            font-weight: 700;
            color: #5a67d8;
            letter-spacing: 0.5px;
        }
        .phonetic {
            font-size: 15px;
            color: #718096;
            font-family: "Lucida Sans Unicode", "Arial Unicode MS", sans-serif;
        }
        .meaning {
            font-size: 15px;
            color: #4a5568;
            margin-bottom: 12px;
            line-height: 1.55;
        }
        .level-badge {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 6px;
            font-weight: 600;
        }
        .level-1 { background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8; }
        .level-2 { background: #faf5ff; color: #6b46c1; border: 1px solid #e9d8fd; }
        .level-3 { background: #fffff0; color: #b7791f; border: 1px solid #fefcbf; }

        /* Audio Buttons */
        .audio-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .btn-audio {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: #f7fafc;
            color: #4a5568;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn-audio:hover {
            background: #eef2ff;
            border-color: #667eea;
            color: #5a67d8;
        }
        .btn-audio.playing {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
            animation: glow-light 1s ease-in-out infinite alternate;
        }
        .btn-audio.audio-error {
            background: #e53e3e;
            border-color: #e53e3e;
            color: #fff;
        }
        @keyframes glow-light {
            from { box-shadow: 0 0 5px rgba(102,126,234,0.3); }
            to { box-shadow: 0 0 15px rgba(102,126,234,0.25), 0 0 25px rgba(102,126,234,0.15); }
        }
        .btn-audio .icon { font-size: 14px; }

        /* Example Sentence */
        .example-box {
            background: #f7fafc;
            border-radius: 10px;
            padding: 12px 14px;
            margin-top: 10px;
            border: 1px solid #edf2f7;
        }
        .example-label {
            font-size: 11px;
            color: #a0aec0;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .example-en {
            font-size: 15px;
            color: #2d3748;
            line-height: 1.6;
            margin-bottom: 4px;
        }
        .example-cn {
            font-size: 13px;
            color: #718096;
            line-height: 1.5;
        }

        /* Friends Scene */
        .friends-section {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .scene-card {
            background: #fff;
            border-radius: 18px;
            padding: 25px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            position: relative;
            overflow: visible;
            margin-bottom: 20px;
        }
        .scene-card::after {
            content: '\2615';
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 80px;
            opacity: 0.06;
            pointer-events: none;
        }
        .scene-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .scene-header h3 {
            font-size: 18px;
            color: #dd6b20;
            margin: 0;
        }
        .ep-badge {
            font-size: 12px;
            color: #fff;
            background: linear-gradient(90deg,#00a1d6,#fb7299);
            border-radius: 20px;
            padding: 2px 10px;
        }
        .scene-dialogue {
            background: #fffaf0;
            border-left: 3px solid #ed8936;
            border-radius: 0 10px 10px 0;
            padding: 14px 18px;
            margin: 10px 0;
            font-style: italic;
            font-size: 17px;
            line-height: 1.7;
            color: #2d3748;
        }
        .scene-translation {
            color: #718096;
            font-size: 14px;
            margin-top: 8px;
            padding-left: 12px;
            border-left: 2px solid #e2e8f0;
            margin-bottom: 14px;
        }
        /* Bilibili player bar */
        .bili-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .btn-bili {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 22px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #00a1d6, #fb7299);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            user-select: none;
        }
        .btn-bili:hover { transform: scale(1.03); box-shadow: 0 5px 18px rgba(0,161,214,.35); }
        .btn-bili.open  { background: linear-gradient(135deg, #fb7299, #ff6b6b); }
        .btn-bili-fallback {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 1.5px solid #cbd5e0;
            color: #718096;
            font-size: 16px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-bili-fallback:hover { border-color: #00a1d6; color: #00a1d6; }
        /* Embedded player */
        .bili-player {
            margin-top: 14px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            background: #000;
            animation: fadeSlide 0.3s ease;
            position: relative;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .bili-player iframe {
            width: 100%;
            height: 260px;
            display: block;
            border: none;
        }
        .player-loading, .player-fail {
            text-align: center;
            padding: 40px 20px;
            color: #a0aec0;
            font-size: 14px;
            background: #1a1a2e;
            color: #a0aec0;
        }
        .btn-open-bili {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, #00a1d6, #fb7299);
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 25px;
            color: #a0aec0;
            font-size: 13px;
            margin-top: 40px;
        }
        .footer a { color: #667eea; text-decoration: none; }

        /* Responsive */
        @media (max-width: 480px) {
            .header h1 { font-size: 20px; }
            .word-text { font-size: 24px; }
            .cards-container { grid-template-columns: 1fr; }
            .scene-dialogue { font-size: 15px; }
        }
    </style>
</head>
<body>

<!-- ===== Header ===== -->
<div class="header">
    <h1>📚 1000 High-Frequency Words</h1>
    <div class="subtitle">Day {{day_num}} · 第{{start_num}}-{{end_num}}词 · {{date_str}}</div>
    <div class="progress-bar">
        {{progress_dots}}
    </div>
</div>

<!-- ===== Word Cards ===== -->
<div class="section-title"><span class="emoji">📝</span> 今日单词</div>
<div class="cards-container">
{{word_cards}}
</div>

<!-- ===== Friends Scene ===== -->
<div class="section-title"><span class="emoji">🎬</span> 老友记片段 · Friends Clip</div>
<div class="friends-section">
{{friends_scenes}}
</div>

<!-- ===== Footer ===== -->
<div class="footer">
    <p>🎯 基于龙飞虎《6个月学会任何一种外语》方法论 | 1000高频词 = 85%日常沟通</p>
    <p>Made with ❤️ for 疙瘩汤's English Learning Journey 🐾</p>
</div>

<script>
// ========== TTS (Web Speech API - fallback) ==========
let _ttsReady = false;
function speak(text, rate = 0.5) {
    if (!('speechSynthesis' in window)) {
        console.warn('Web Speech API not supported');
        return;
    }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = rate; u.pitch = 1;
    
    // Try to pick a good English voice
    const voices = speechSynthesis.getVoices();
    const pref = voices.find(v =>
        v.name.includes('Jenny') || v.name.includes('Samantha') ||
        v.name.includes('Microsoft Zira') || v.name.includes('Google US'));
    if (pref) u.voice = pref;
    
    // Debug: log if no voice found
    if (voices.length === 0) {
        console.warn('No TTS voices available yet, speaking anyway...');
    }
    
    speechSynthesis.speak(u);
}
// Load voices (may be async in some browsers)
if ('speechSynthesis' in window) {
    const loadVoices = () => { speechSynthesis.getVoices(); _ttsReady = true; };
    loadVoices();
    speechSynthesis.onvoiceschanged = loadVoices;
}

// ========== Local TTS Audio Playback (mp3 files) ==========
let _activeAudioId = null;
let _fallbackText = {}; // store fallback text for each audio ID
function playLocalAudio(audioId) {
    const audio   = document.getElementById(audioId);
    const btn     = document.getElementById(audioId + '_btn');
    if (!audio || !btn) { console.warn('Element not found:', audioId); return; }

    // Stop any currently playing audio
    document.querySelectorAll('.btn-audio-tts').forEach(b => {
        b.classList.remove('playing');
        b.classList.remove('audio-error');
        const origText = b.getAttribute('data-orig-text');
        if (origText) b.innerHTML = origText;
    });
    document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
    if ('speechSynthesis' in window) speechSynthesis.cancel();

    if (_activeAudioId === audioId && !audio.paused) {
        // Toggle off: pause
        audio.pause();
        audio.currentTime = 0;
        btn.classList.remove('playing');
        _activeAudioId = null;
    } else {
        // Play
        _activeAudioId = audioId;
        if (!btn.hasAttribute('data-orig-text')) {
            btn.setAttribute('data-orig-text', btn.innerHTML);
        }
        btn.classList.add('playing');

        // Slow down playback for learning
        audio.playbackRate = audioId.startsWith('w_') ? 0.75 : 0.65;

        // Check if audio src can be loaded (detect file:// protocol issues)
        const src = audio.getAttribute('src') || (audio.querySelector('source') ? audio.querySelector('source').getAttribute('src') : '');
        const isLocalFile = window.location.protocol === 'file:';

        const playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                btn.classList.add('playing');
                btn.innerHTML = btn.getAttribute('data-orig-text').replace('🔊', '⏸').replace('🗣️', '⏸');
                console.log('Audio playing OK:', audioId);
            }).catch(e => {
                console.warn('Audio play() failed, using TTS fallback:', e, audioId);
                btn.classList.remove('playing');
                _activeAudioId = null;
                // Fallback to Web Speech API
                const fbText = _fallbackText[audioId];
                if (fbText) {
                    speak(fbText, audioId.startsWith('w_') ? 0.45 : 0.4);
                    // Visual feedback for fallback
                    btn.classList.add('playing');
                    setTimeout(() => { btn.classList.remove('playing'); btn.innerHTML = btn.getAttribute('data-orig-text') || btn.innerHTML; }, 2000);
                } else {
                    btn.classList.add('audio-error');
                    setTimeout(() => btn.classList.remove('audio-error'), 2000);
                }
            });
        }

        audio.onended = function() {
            btn.classList.remove('playing');
            btn.classList.remove('audio-error');
            btn.innerHTML = btn.getAttribute('data-orig-text') || btn.innerHTML;
            _activeAudioId = null;
        };
        audio.onerror = function(e) {
            console.error('Audio load error, using TTS fallback:', audioId, e);
            btn.classList.remove('playing');
            btn.classList.add('audio-error');
            _activeAudioId = null;
            // Fallback to Web Speech API
            const fbText = _fallbackText[audioId];
            if (fbText) { 
                speak(fbText, audioId.startsWith('w_') ? 0.45 : 0.4); 
                setTimeout(() => btn.classList.remove('audio-error'), 2000); 
            }
        };
    }
}

// ========== Bilibili Embedded Player ==========

// Detect if we can load cross-origin iframes (file:// blocks them)
let _iframeOk = null;  // null=unknown, true/false
function detectIframeSupport(cb) {
    if (_iframeOk !== null) { cb(_iframeOk); return; }
    const t = document.createElement('iframe');
    t.src = 'https://www.bilibili.com/favicon.ico';
    t.style.cssText = 'width:1px;height:1px;position:absolute;top:-9999px;opacity:0;';
    t.onload  = () => { _iframeOk = true;  document.body.removeChild(t); cb(true); };
    t.onerror = () => { _iframeOk = false; document.body.removeChild(t); cb(false); };
    document.body.appendChild(t);
    // Timeout fallback: if no event fires in 4s, assume OK (let iframe try itself)
    setTimeout(() => { if (_iframeOk === null) { _iframeOk = true; cb(true); } }, 4000);
}

function togglePlayer(playerId, btnId, iframeId, embedUrl) {
    const player = document.getElementById(playerId);
    const btn    = document.getElementById(btnId);
    const iframe = document.getElementById(iframeId);
    if (!player || !btn || !iframe) return;

    // Close other open players
    document.querySelectorAll('.bili-player').forEach(p => {
        if (p.id !== playerId && p.style.display !== 'none') {
            p.style.display = 'none';
            const ob = document.getElementById(p.id.replace('bili_player_','bili_btn_'));
            if (ob) { ob.classList.remove('open'); ob.textContent = '🎬 老友记原声片段'; }
            // pause iframe src to stop audio
            const oi = p.querySelector('iframe');
            if (oi) oi.src = 'about:blank';
        }
    });

    if (player.style.display !== 'none') {
        // Close
        player.style.display = 'none';
        iframe.src = 'about:blank';
        btn.classList.remove('open');
        btn.innerHTML = '&#127916; 老友记原声片段';
    } else {
        // Open
        player.style.display = 'block';
        btn.classList.add('open');
        btn.innerHTML = '&#9203; 播放中 · 点击关闭';

        const loadingEl = document.getElementById('loading_' + playerId.split('_').pop());
        const failEl    = document.getElementById('fail_'    + playerId.split('_').pop());

        if (loadingEl) loadingEl.style.display = 'block';
        if (failEl)    failEl.style.display    = 'none';
        iframe.style.display = 'none';

        // Force fresh load: add timestamp to bust cache & ensure correct page
        const sep = embedUrl.indexOf('?') > -1 ? '&' : '?';
        const freshUrl = embedUrl + sep + '_t=' + Date.now();
        
        // Reset iframe completely before setting new src
        iframe.src = 'about:blank';
        // Use setTimeout to ensure the browser registers the about:blank reset first
        setTimeout(() => {
            iframe.src = freshUrl;
        }, 50);

        // Timeout: if iframe doesn't trigger onload in 8s, show fail
        const timer = setTimeout(() => {
            if (iframe.style.display === 'none') {
                if (loadingEl) loadingEl.style.display = 'none';
                if (failEl)    failEl.style.display    = 'block';
            }
        }, 8000);
        iframe._failTimer = timer;
    }
}

function onIframeLoad(iframe, loadingId) {
    // If src was reset to about:blank, ignore
    if (!iframe.src || iframe.src === 'about:blank') return;
    clearTimeout(iframe._failTimer);

    const loadingEl = document.getElementById(loadingId);
    const idx       = loadingId.replace('loading_', '');
    const failEl    = document.getElementById('fail_' + idx);

    // Try to detect blank/blocked content
    let blocked = false;
    try {
        // If cross-origin access is blocked, contentDocument may throw
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (!doc || doc.body.innerHTML.trim() === '') blocked = true;
    } catch(e) {
        // Cross-origin = normal, not an error
        blocked = false;
    }

    if (blocked) {
        if (loadingEl) loadingEl.style.display = 'none';
        if (failEl)    failEl.style.display    = 'block';
        iframe.style.display = 'none';
    } else {
        if (loadingEl) loadingEl.style.display = 'none';
        if (failEl)    failEl.style.display    = 'none';
        iframe.style.display = 'block';
    }
}
</script>

</body>
</html>
