name: Daily High-Freq Words Generator

on:
  schedule:
    # 北京时间每天 10:00 = UTC 02:00
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      day_num:
        description: '指定天数 (1-100)'
        required: false
        default: ''

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install edge-tts requests

      - name: Calculate day number
        id: calc
        run: |
          # 项目开始日期（可调整）
          START_DATE="2026-04-22"
          
          if [ -n "${{ github.event.inputs.day_num }}" ]; then
            DAY_NUM="${{ github.event.inputs.day_num }}"
          else
            # 计算从开始日期到今天的天数+1
            START_SEC=$(date -d "$START_DATE" +%s)
            TODAY_SEC=$(date +%s)
            DIFF_SEC=$((TODAY_SEC - START_SEC))
            DAY_NUM=$((DIFF_SEC / 86400 + 1))
            
            # 边界检查
            if [ "$DAY_NUM" -lt 1 ]; then DAY_NUM=1; fi
            if [ "$DAY_NUM" -gt 100 ]; then
              echo "⚠️ 已超过100天范围，循环回Day 1"
              DAY_NUM=1
            fi
          fi
          
          TODAY=$(date +%Y-%m-%d)
          echo "day_num=$DAY_NUM" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "📅 Day $DAY_NUM | Date: $TODAY"

      - name: Generate TTS audio for today
        run: |
          # 计算当天词的序号范围: day_num对应第(day_num-1)*10+1 到 day_num*10
          DAY=${{ steps.calc.outputs.day_num }}
          START=$(( (DAY - 1) * 10 + 1 ))
          END=$(( DAY * 10 ))
          echo "🎙️ 生成第 $START ~ $END 词的 TTS 音频..."
          python scripts/generate_audio.py --start $START --end $END
        env:
          PYTHONIOENCODING: utf-8

      - name: Generate daily HTML
        run: |
          python scripts/generate.py generate ${{ steps.calc.outputs.day_num }} ${{ steps.calc.outputs.today }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Push to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 提交 output/(HTML) + 当天音频目录
          DAY=${{ steps.calc.outputs.day_num }}
          START=$(( (DAY - 1) * 10 + 1 ))
          END=$(( DAY * 10 ))
          for i in $(seq $START $END); do
            PADDED=$(printf '%04d' $i)
            git add "audio/tts/$PADDED/" 2>/dev/null || true
          done
          git add output/ || true
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "📚 Day ${{ steps.calc.outputs.day_num }} (${{ steps.calc.outputs.today }}) - High Freq Words"
            git push || echo "Push failed (might be first time)"
          fi

      - name: Notify Feishu (飞书推送)
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/push_notify.py feishu \
            --day ${{ steps.calc.outputs.day_num }} \
            --date ${{ steps.calc.outputs.today }} \
            --url "https://zjunxcr.github.io/high-freq-words/output/high_freq_words_day$(printf '%03d' ${{ steps.calc.outputs.day_num }})_${{ steps.calc.outputs.today }}.html"
        continue-on-error: true

      - name: Notify WeChat (微信推送)
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/push_notify.py wechat \
            --day ${{ steps.calc.outputs.day_num }} \
            --date ${{ steps.calc.outputs.today }}
        continue-on-error: true
